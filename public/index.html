<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איקס מיקס דריקס של סבא עופר</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="game-header">
        <h1>איקס מיקס דריקס של סבא עופר</h1>
        <div class="header-illustration">
            <div class="mini-grid">
                <div></div><div class="x">X</div><div></div>
                <div></div><div class="o">O</div><div></div>
                <div></div><div></div><div></div>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- מסך לובי חדש ומעוצב -->
        <div id="lobby" class="screen active">
            <div class="card colorful-card">
                <h2>ברוכים הבאים! 👋</h2>
                <div class="input-group">
                    <label for="playerName">השם שלך:</label>
                    <input type="text" id="playerName" class="input-large" placeholder="איך קוראים לך?" autocomplete="off">
                </div>
                
                <div class="action-buttons">
                    <button id="btnChooseLocal" class="btn-colorful btn-orange">🤝 משחק באותו מכשיר</button>
                    <button id="btnChooseRemote" class="btn-colorful btn-blue">🌍 שלח הזמנה בוואטסאפ</button>
                </div>

                <!-- נפתח רק אם בוחרים משחק באותו מכשיר -->
                <div id="localPlaySection" class="hidden local-box-animated">
                    <label for="localPlayer2Name">שם השחקן השני:</label>
                    <input type="text" id="localPlayer2Name" class="input-large" placeholder="איך קוראים לו/לה?" autocomplete="off">
                    <button id="localPlayBtn" class="btn-colorful btn-green">🚀 התחל משחק עכשיו!</button>
                </div>

                <div class="divider">
                    <span>או</span>
                </div>

                <div class="join-box">
                    <h3>הוזמנתם למשחק? ✉️</h3>
                    <input type="text" id="roomCodeInput" class="input-large" placeholder="הקלידו את שם החדר" autocomplete="off">
                    <button id="joinBtn" class="btn-secondary">הצטרף לחדר</button>
                </div>
            </div>
        </div>

        <div id="inviteJoinScreen" class="screen">
            <div class="card">
                <p>מחכים לך בחדר: <strong id="invitedRoomDisplay"></strong></p>
                <input type="text" id="invitePlayerName" class="input-large" placeholder="איך קוראים לך?" autocomplete="off">
                <button id="inviteJoinBtn" class="btn-primary">היכנס למשחק</button>
            </div>
        </div>

        <div id="waitingScreen" class="screen">
            <div class="card">
                <h2>קוד חדר: <span id="inviteCode" class="highlight"></span></h2>
                <p>שלח את הקישור לנכד/ה:</p>
                <button id="inviteWhatsAppBtn" class="btn-whatsapp">שלח הזמנה 💬</button>
                <div class="loader">ממתין להצטרפות...</div>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <div id="turnIndicator" class="turn-status">מתחברים...</div>
            <div class="board" id="board">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>
            <div class="score-display">
                <div id="scoreText">טוען תוצאות...</div>
            </div>
            <button id="requestEndBtn" class="btn-end">סיום התחרות וסיכום</button>
        </div>

        <div id="resultsScreen" class="screen">
            <div class="card results-card">
                <h2>🏆 סיכום התחרות 🏆</h2>
                <div id="finalStats" class="final-stats"></div>
                <button id="finalWhatsAppBtn" class="btn-whatsapp">שתף תוצאות בוואטסאפ 💬</button>
                <button onclick="location.reload()" class="btn-secondary">חזרה לתפריט</button>
            </div>
        </div>
    </main>

    <div id="winPopup" class="popup hidden">
        <h1 id="winMessage">כל הכבוד!</h1>
    </div>

    <script src="app.js"></script>
</body>
</html>
