<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איקס מיקס דריקס של סבא עופר</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="main-game-header">
        <h1>איקס מיקס דריקס של סבא עופר</h1>
        <div class="header-graphic">
            <div class="mini-board-icon">
                <div class="m-cell"></div><div class="m-cell x-color">X</div><div class="m-cell"></div>
                <div class="m-cell"></div><div class="m-cell o-color">O</div><div class="m-cell"></div>
                <div class="m-cell"></div><div class="m-cell"></div><div class="m-cell"></div>
            </div>
        </div>
    </header>

    <main class="content-wrapper">
        <div id="lobby" class="screen active">
            <div class="card lobby-card">
                <div class="user-intro">
                    <label>איך קוראים לך?</label>
                    <input type="text" id="playerName" class="styled-input" placeholder="למשל: סבא עופר" autocomplete="off">
                </div>

                <div class="main-actions">
                    <button id="btnChooseLocal" class="action-btn local-style">📱 משחק באותו מכשיר</button>
                    <button id="btnChooseRemote" class="action-btn remote-style">💬 שלח הזמנה בוואטסאפ</button>
                </div>

                <div id="localPlaySection" class="hidden-section">
                    <label>שם השחקן השני:</label>
                    <input type="text" id="localPlayer2Name" class="styled-input" placeholder="שם הנכד/ה" autocomplete="off">
                    <button id="localPlayBtn" class="btn-start-now">🚀 התחל משחק עכשיו!</button>
                </div>

                <div class="bottom-join">
                    <p>הוזמנתם לחדר קיים? הכניסו את שמו:</p>
                    <div class="join-row">
                        <input type="text" id="roomCodeInput" class="styled-input small-input" placeholder="קוד חדר">
                        <button id="joinBtn" class="btn-join-action">הצטרף</button>
                    </div>
                </div>
            </div>
        </div>

        <div id="waitingScreen" class="screen">
            <div class="card">
                <h2>קוד החדר: <span id="inviteCode" class="room-highlight"></span></h2>
                <p>שלח את הקישור בוואטסאפ:</p>
                <button id="inviteWhatsAppBtn" class="whatsapp-send-btn">שלח הזמנה לשחק 💬</button>
                <div class="wait-status">ממתין להצטרפות...</div>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <div id="turnIndicator" class="game-status-bar">מתחברים לשרת...</div>
            <div class="board" id="gameBoard">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>
            <div class="footer-stats">
                <div id="scoreText" class="current-score">סבא עופר 0 - 0 נכדים</div>
                <button id="requestEndBtn" class="btn-finish-series">סיום התחרות וסיכום 🏁</button>
            </div>
        </div>

        <div id="resultsScreen" class="screen">
            <div class="card summary-card">
                <h2>🏆 סיכום התחרות 🏆</h2>
                <div id="finalStats" class="final-details"></div>
                <button id="finalWhatsAppBtn" class="whatsapp-send-btn">שתף תוצאות בוואטסאפ 💬</button>
                <button onclick="location.reload()" class="btn-restart">חזרה להתחלה</button>
            </div>
        </div>

        <div id="inviteJoinScreen" class="screen">
            <div class="card">
                <p>נכד/ה יקר/ה, הוזמנת לחדר: <strong id="invitedRoomDisplay"></strong></p>
                <input type="text" id="invitePlayerName" class="styled-input" placeholder="איך קוראים לך?">
                <button id="inviteJoinBtn" class="action-btn remote-style">היכנס למשחק</button>
            </div>
        </div>
    </main>

    <div id="winPopup" class="popup-win hidden">
        <h1 id="winMessage">כל הכבוד!</h1>
    </div>

    <script src="app.js"></script>
</body>
</html>
