<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>איקס מיקס דריקס של סבא עופר</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <header class="game-header-3d">
        <h1>✨ איקס מיקס דריקס ✨</h1>
        <div class="header-illustration">
            <div class="mini-grid-3d">
                <div class="m-cell"></div><div class="m-cell x-color">X</div><div class="m-cell"></div>
                <div class="m-cell"></div><div class="m-cell o-color">O</div><div class="m-cell"></div>
                <div class="m-cell"></div><div class="m-cell"></div><div class="m-cell"></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div id="lobby" class="screen active">
            <div class="card card-3d card-yellow">
                <h2>ברוכים הבאים! 👋</h2>
                <input type="text" id="playerName" class="input-3d" placeholder="השם שלך (למשל: סבא עופר)" autocomplete="off">
                
                <div class="action-buttons">
                    <button id="btnChooseLocal" class="btn-3d btn-orange">🤝 משחק באותו מכשיר</button>
                    <button id="btnChooseRemote" class="btn-3d btn-blue">🌍 שלח הזמנה בוואטסאפ</button>
                </div>

                <div id="localPlaySection" class="hidden-section">
                    <input type="text" id="localPlayer2Name" class="input-3d" placeholder="שם השחקן השני">
                    <button id="localPlayBtn" class="btn-3d btn-green">🚀 התחל משחק עכשיו!</button>
                </div>

                <div id="joinSection" style="margin-top:20px;">
                    <p>או הצטרפו לחדר:</p>
                    <input type="text" id="roomCodeInput" class="input-3d" placeholder="קוד חדר">
                    <button id="joinBtn" class="btn-3d btn-gray">היכנס 🎯</button>
                </div>
            </div>
        </div>

        <div id="waitingScreen" class="screen">
            <button class="btn-home">🏠</button>
            <div class="card card-3d card-blue">
                <h2>קוד החדר שלכם:</h2>
                <span id="inviteCode" class="room-highlight-3d"></span>
                <p>שלחו את הקישור בוואטסאפ:</p>
                <button id="inviteWhatsAppBtn" class="btn-3d btn-whatsapp">שלח הזמנה 💬</button>
                <p>מחכים לשחקן השני...</p>
            </div>
        </div>

        <div id="gameScreen" class="screen">
            <button class="btn-home">🏠</button>
            <div id="turnIndicator" class="game-status-bubble">מתחברים...</div>
            <div class="board-3d" id="gameBoard">
                <div class="cell-3d" data-index="0"></div><div class="cell-3d" data-index="1"></div><div class="cell-3d" data-index="2"></div>
                <div class="cell-3d" data-index="3"></div><div class="cell-3d" data-index="4"></div><div class="cell-3d" data-index="5"></div>
                <div class="cell-3d" data-index="6"></div><div class="cell-3d" data-index="7"></div><div class="cell-3d" data-index="8"></div>
            </div>
            <div class="footer-stats-3d">
                <div id="scoreText">סבא עופר 0 - 0 נכדים</div>
                <button id="requestEndBtn" class="btn-3d btn-red">🏁 סיום וסיכום</button>
            </div>
        </div>

        <div id="resultsScreen" class="screen">
            <button class="btn-home">🏠</button>
            <div class="card card-3d card-yellow">
                <h2>🏆 סיכום התחרות 🏆</h2>
                <div id="finalStats"></div>
                <button id="finalWhatsAppBtn" class="btn-3d btn-whatsapp">שתף בוואטסאפ 💬</button>
            </div>
        </div>

        <div id="inviteJoinScreen" class="screen">
            <button class="btn-home">🏠</button>
            <div class="card card-3d card-green">
                <p>הוזמנתם לחדר: <strong id="invitedRoomDisplay"></strong></p>
                <input type="text" id="invitePlayerName" class="input-3d" placeholder="איך קוראים לך?">
                <button id="inviteJoinBtn" class="btn-3d btn-blue">היכנס למשחק 🎮</button>
            </div>
        </div>
    </main>

    <div id="winPopup" class="popup-win hidden"><h1 id="winMessage">כל הכבוד!</h1></div>
    <script src="app.js"></script>
</body>
</html>
